# =============================================================================
# Fly.io deploy config for the API. DEPLOY-ONLY: never read at runtime by the app.
# Region BOM (Mumbai) for DPDP-aligned residency.
# Swap to AWS by switching to infra/aws/* + .github/workflows/deploy-aws.yml.template.
# =============================================================================

app = "clinic-crm-api"
primary_region = "bom"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "../docker/api.Dockerfile"

[deploy]
  release_command = "uv run alembic upgrade head"
  strategy = "rolling"

[env]
  APP_ENV = "production"
  LOG_LEVEL = "INFO"
  PORT = "8000"

[[services]]
  protocol = "tcp"
  internal_port = 8000
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.http_checks.healthz]
    interval = "15s"
    grace_period = "20s"
    method = "get"
    path = "/healthz"
    protocol = "http"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[metrics]
  port = 8000
  path = "/metrics"
