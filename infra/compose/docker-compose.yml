# =============================================================================
# clinic-crm — local dev stack
# Run from repo root:
#   docker compose -f infra/compose/docker-compose.yml up --build
# =============================================================================

name: clinic-crm

services:
  postgres:
    image: postgres:16-alpine
    container_name: clinic-crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-12-13T22-19-12Z
    container_name: clinic-crm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniominio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minio miniominio &&
        mc mb --ignore-existing local/clinic-crm-dev &&
        mc anonymous set none local/clinic-crm-dev &&
        echo 'bucket ready'
      "
    restart: "no"

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: clinic-crm-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # web UI

  api:
    container_name: clinic-crm-api
    build:
      context: ../..
      dockerfile: infra/docker/api.dev.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://crm:crm@postgres:5432/crm
      DATABASE_URL_SYNC: postgresql+psycopg://crm:crm@postgres:5432/crm
      S3_ENDPOINT: http://minio:9000
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://web:5173"
    volumes:
      - ../../apps/api:/app
      - api_venv:/app/.venv
    ports:
      - "8000:8000"
    command: ["uv", "run", "uvicorn", "app.main:app", "--reload", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    container_name: clinic-crm-web
    build:
      context: ../..
      dockerfile: infra/docker/web.dev.Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # Inside compose network, reach API by service name.
      VITE_API_BASE_URL: http://api:8000
    volumes:
      - ../../apps/web:/work/apps/web
      - ../../packages:/work/packages
      - web_node_modules:/work/node_modules
      - web_app_node_modules:/work/apps/web/node_modules
    ports:
      - "5173:5173"

volumes:
  pgdata:
  miniodata:
  api_venv:
  web_node_modules:
  web_app_node_modules:
